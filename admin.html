<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Chat Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root {
    --pink-1: #ff6fa5;
    --pink-2: #ff4f8f;
    --dark: #2b1420;
    --grey-bubble: #f1f1f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Poppins', sans-serif;
    background: #fdf3f7;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- LOGIN SCREEN ---------- */
  #loginScreen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffd1e3, #ff9fc3);
  }
  .login-box {
    background: white;
    padding: 36px 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 20px 50px rgba(255,79,143,0.3);
    text-align: center;
  }
  .login-box h2 { margin-bottom: 18px; color: var(--dark); }
  .login-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 2px solid #ffe4ee;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }
  .login-box input:focus { border-color: var(--pink-1); }
  .login-box button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  .login-error { color: #d92c4c; font-size: 13px; margin-top: 10px; min-height: 16px; }

  /* ---------- DASHBOARD ---------- */
  #dashboard { display: none; height: 100vh; }
  .app-layout { display: flex; height: 100vh; }

  /* Sidebar: conversation list */
  .sidebar {
    width: 320px;
    background: white;
    border-right: 1px solid #f0dbe4;
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 16px;
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
    color: white;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-header img {
    width: 38px; height: 38px; border-radius: 50%;
    border: 2px solid white; object-fit: cover;
  }
  .sidebar-header .title { font-weight: 600; font-size: 15px; }
  .logout-btn {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }

  .conv-list { flex: 1; overflow-y: auto; }
  .conv-item {
    padding: 14px 16px;
    border-bottom: 1px solid #f7e8ee;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .conv-item:hover, .conv-item.active { background: #fff0f5; }
  .conv-item .name { font-weight: 600; color: var(--dark); font-size: 14px; }
  .conv-item .preview {
    font-size: 12px; color: #999; margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-item .meta { font-size: 10px; color: #bbb; margin-top: 3px; }
  .unread-dot {
    position: absolute; right: 16px; top: 16px;
    width: 9px; height: 9px; background: #ff4f8f; border-radius: 50%;
  }

  /* Chat panel */
  .chat-panel { flex: 1; display: flex; flex-direction: column; background: #fff7fa; }
  .chat-panel-header {
    padding: 16px 20px;
    background: white;
    border-bottom: 1px solid #f0dbe4;
    display: flex; flex-direction: column; gap: 2px;
  }
  .chat-panel-header .name { font-weight: 600; color: var(--dark); font-size: 16px; }
  .chat-panel-header .detail { font-size: 12px; color: #999; }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .bubble {
    max-width: 60%; padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.4; word-wrap: break-word;
  }
  .bubble.visitor { align-self: flex-start; background: var(--grey-bubble); color: var(--dark); border-bottom-left-radius: 4px; }
  .bubble.admin { align-self: flex-end; background: linear-gradient(135deg, var(--pink-1), var(--pink-2)); color: white; border-bottom-right-radius: 4px; }
  .bubble .time { font-size: 10px; opacity: 0.7; margin-top: 4px; display: block; }

  .reply-area {
    display: flex; padding: 14px; gap: 10px; background: white; border-top: 1px solid #f0dbe4;
  }
  .reply-area input {
    flex: 1; border: 2px solid #ffe4ee; border-radius: 20px; padding: 10px 16px; font-size: 14px; outline: none;
  }
  .reply-area input:focus { border-color: var(--pink-1); }
  .reply-area button {
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
    border: none; color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer;
  }

  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #ccc; font-size: 14px; flex-direction: column; gap: 8px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <!-- ===== YAHAN APNI PHOTO KA LINK DAALO ===== -->
        <img src="https://placehold.co/100x100/ff6fa5/white?text=S" alt="Shubham">
        <div class="title">Chat Dashboard</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>

    <div class="chat-panel" id="chatPanel">
      <div class="empty-state" id="emptyState">
        <div style="font-size:40px;">💬</div>
        <div>Left side se koi chat select karo</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ================== CONFIG ==================
  const firebaseConfig = {
    apiKey: "AIzaSyDn-m42r5S7aBywGCg4AUrrr9PMSh1_Iy8",
    authDomain: "chatwithshubham-9e745.firebaseapp.com",
    projectId: "chatwithshubham-9e745",
    storageBucket: "chatwithshubham-9e745.firebasestorage.app",
    messagingSenderId: "552198923630",
    appId: "1:552198923630:web:0a52f9fd03c6d30f184d7f"
  };
  // ==============================================

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let activeConversationId = null;
  let unsubscribeMessages = null;

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadConversations();
    } else {
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("dashboard").style.display = "none";
    }
  });

  function login() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = "";

    auth.signInWithEmailAndPassword(email, password)
      .catch(err => {
        errorEl.textContent = "Galat email ya password.";
      });
  }

  function logout() {
    auth.signOut();
  }

  function loadConversations() {
    db.collection("conversations")
      .orderBy("lastMessageTime", "desc")
      .onSnapshot(snapshot => {
        const listEl = document.getElementById("convList");
        listEl.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          const item = document.createElement("div");
          item.className = "conv-item" + (doc.id === activeConversationId ? " active" : "");
          const time = data.lastMessageTime ? new Date(data.lastMessageTime.toDate()).toLocaleString() : "";
          item.innerHTML = `
            <div class="name">${escapeHtml(data.visitorName || "Unknown")}</div>
            <div class="preview">${escapeHtml(data.lastMessage || "")}</div>
            <div class="meta">${escapeHtml(data.device || "")} • ${escapeHtml(data.location || "")} • ${time}</div>
            ${data.unreadByAdmin ? '<div class="unread-dot"></div>' : ""}
          `;
          item.onclick = () => openConversation(doc.id, data);
          listEl.appendChild(item);
        });
      });
  }

  function openConversation(convId, data) {
    activeConversationId = convId;

    // mark as read
    db.collection("conversations").doc(convId).update({ unreadByAdmin: false }).catch(() => {});

    const chatPanel = document.getElementById("chatPanel");
    chatPanel.innerHTML = `
      <div class="chat-panel-header">
        <div class="name">${escapeHtml(data.visitorName || "Unknown")}</div>
        <div class="detail">${escapeHtml(data.device || "")} • ${escapeHtml(data.location || "")}</div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="reply-area">
        <input type="text" id="replyInput" placeholder="Reply likho..." onkeydown="if(event.key==='Enter')sendReply()">
        <button onclick="sendReply()">➤</button>
      </div>
    `;

    if (unsubscribeMessages) unsubscribeMessages();

    unsubscribeMessages = db.collection("conversations").doc(convId)
      .collection("messages")
      .orderBy("timestamp", "asc")
      .onSnapshot(snapshot => {
        const msgsEl = document.getElementById("chatMessages");
        if (!msgsEl) return;
        msgsEl.innerHTML = "";
        snapshot.forEach(doc => {
          const m = doc.data();
          const bubble = document.createElement("div");
          bubble.className = "bubble " + (m.sender === "admin" ? "admin" : "visitor");
          const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";
          bubble.innerHTML = `${escapeHtml(m.text)}<span class="time">${time}</span>`;
          msgsEl.appendChild(bubble);
        });
        msgsEl.scrollTop = msgsEl.scrollHeight;
      });
  }

  async function sendReply() {
    const input = document.getElementById("replyInput");
    const text = input.value.trim();
    if (!text || !activeConversationId) return;
    input.value = "";

    await db.collection("conversations").doc(activeConversationId).collection("messages").add({
      text,
      sender: "admin",
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    await db.collection("conversations").doc(activeConversationId).update({
      lastMessage: text,
      lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
