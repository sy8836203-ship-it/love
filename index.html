<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Shubham</title>

<!-- PWA support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6fa5">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shubham Chat">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root {
    --pink-1: #ff6fa5;
    --pink-2: #ff4f8f;
    --pink-light: #ffe4ee;
    --dark: #2b1420;
    --white: #fffafc;
    --grey-bubble: #f1f1f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'Segoe UI', 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffd1e3, #ff9fc3);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .chat-container {
    width: 100%;
    max-width: 420px;
    height: 640px;
    background: var(--white);
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(255, 79, 143, 0.35);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
    color: white;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-header img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
  }

  .chat-header .info h2 {
    font-size: 16px;
  }

  .chat-header .info p {
    font-size: 12px;
    opacity: 0.9;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #37e37e;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }

  /* Messages area */
  .messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #fff7fa;
  }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
  }

  .bubble.visitor {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bubble.admin {
    align-self: flex-start;
    background: var(--grey-bubble);
    color: var(--dark);
    border-bottom-left-radius: 4px;
  }

  .bubble .time {
    font-size: 10px;
    opacity: 0.7;
    margin-top: 4px;
    display: block;
  }

  .bubble-wrap {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    position: relative;
  }

  .bubble-wrap.visitor { align-self: flex-end; flex-direction: row; }
  .bubble-wrap.admin { align-self: flex-start; flex-direction: row-reverse; }

  .bubble.deleted {
    font-style: italic;
    opacity: 0.7;
  }

  .msg-menu-btn {
    background: none;
    border: none;
    color: #c98;
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    opacity: 0.6;
  }
  .msg-menu-btn:hover { opacity: 1; }

  .msg-menu {
    position: absolute;
    bottom: 100%;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    overflow: hidden;
    z-index: 10;
    display: none;
    min-width: 150px;
  }
  .bubble-wrap.visitor .msg-menu { right: 0; }
  .bubble-wrap.admin .msg-menu { left: 0; }

  .msg-menu.open { display: block; }

  .msg-menu button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 10px 14px;
    border: none;
    background: white;
    font-size: 13px;
    cursor: pointer;
    color: var(--dark);
  }
  .msg-menu button:hover { background: #ffe4ee; }

  /* Name prompt */
  .name-prompt {
    padding: 24px;
    text-align: center;
  }

  .name-prompt p {
    color: #8a5a6b;
    font-size: 14px;
    margin-bottom: 14px;
  }

  .name-prompt input {
    width: 100%;
    border: 2px solid var(--pink-light);
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
  }

  .name-prompt input:focus {
    border-color: var(--pink-1);
  }

  .name-prompt button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }

  /* Input area */
  .input-area {
    display: flex;
    padding: 12px;
    border-top: 1px solid #f0dbe4;
    gap: 8px;
    background: white;
  }

  .input-area input {
    flex: 1;
    border: 2px solid var(--pink-light);
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
  }

  .input-area input:focus {
    border-color: var(--pink-1);
  }

  .input-area button {
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
    border: none;
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .input-area button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <!-- ===== YAHAN APNI PHOTO KA LINK DAALO ===== -->
    <img src="https://placehold.co/100x100/ff6fa5/white?text=S" alt="Shubham">
    <div class="info">
      <h2>Shubham</h2>
      <p><span class="status-dot"></span>Usually replies fast</p>
    </div>
  </div>

  <!-- Name prompt shown first time -->
  <div class="name-prompt" id="namePrompt">
    <p>Chat shuru karne se pehle apna naam bata do 🙂</p>
    <input type="text" id="visitorName" placeholder="Aapka naam">
    <button onclick="startChat()">Chat Shuru Karo</button>
  </div>

  <!-- Actual chat -->
  <div class="messages hidden" id="messages"></div>

  <div class="input-area hidden" id="inputArea">
    <input type="text" id="msgInput" placeholder="Message likho..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
  // ================== CONFIG ==================
  const firebaseConfig = {
    apiKey: "AIzaSyDn-m42r5S7aBywGCg4AUrrr9PMSh1_Iy8",
    authDomain: "chatwithshubham-9e745.firebaseapp.com",
    projectId: "chatwithshubham-9e745",
    storageBucket: "chatwithshubham-9e745.firebasestorage.app",
    messagingSenderId: "552198923630",
    appId: "1:552198923630:web:0a52f9fd03c6d30f184d7f"
  };

  const TELEGRAM_BOT_TOKEN = "8784344677:AAHdmmTs1WX8fmLbXexkiKDnPSNl6SUjhJo";
  const TELEGRAM_CHAT_ID = "6142353996";
  const MAX_VISIBLE_MESSAGES = 10; // site par sirf itne latest messages dikhenge
  // ==============================================

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let conversationId = localStorage.getItem("chat_conversation_id");
  let visitorName = localStorage.getItem("chat_visitor_name");

  const namePrompt = document.getElementById("namePrompt");
  const messagesEl = document.getElementById("messages");
  const inputArea = document.getElementById("inputArea");

  // Agar returning visitor hai to seedha chat khol do
  if (conversationId && visitorName) {
    openChat();
  }

  function getDeviceInfo() {
    const ua = navigator.userAgent;
    const device = /Mobi|Android/i.test(ua) ? "Mobile" : "Desktop";
    let browser = "Unknown";
    if (ua.includes("Edg")) browser = "Edge";
    else if (ua.includes("Chrome")) browser = "Chrome";
    else if (ua.includes("Firefox")) browser = "Firefox";
    else if (ua.includes("Safari")) browser = "Safari";
    return `${device} - ${browser}`;
  }

  async function getApproxLocation() {
    try {
      const res = await fetch("https://ipapi.co/json/");
      const data = await res.json();
      return `${data.city || "Unknown"}, ${data.country_name || "Unknown"}`;
    } catch (e) {
      return "Unknown";
    }
  }

  async function startChat() {
    const nameInput = document.getElementById("visitorName");
    const name = nameInput.value.trim();
    if (!name) return;

    visitorName = name;
    conversationId = "conv_" + Date.now() + "_" + Math.random().toString(36).substring(2, 8);

    localStorage.setItem("chat_visitor_name", visitorName);
    localStorage.setItem("chat_conversation_id", conversationId);

    const device = getDeviceInfo();
    const location = await getApproxLocation();

    await db.collection("conversations").doc(conversationId).set({
      visitorName,
      device,
      location,
      lastMessage: "",
      lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    openChat();
  }

  function openChat() {
    namePrompt.classList.add("hidden");
    messagesEl.classList.remove("hidden");
    inputArea.classList.remove("hidden");
    listenMessages();
  }

  function listenMessages() {
    db.collection("conversations").doc(conversationId)
      .collection("messages")
      .orderBy("timestamp", "asc")
      .onSnapshot(snapshot => {
        const msgs = [];
        snapshot.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
        renderMessages(msgs);
      });
  }

  function renderMessages(msgs) {
    messagesEl.innerHTML = "";
    msgs.forEach(m => {
      if (m.deletedForVisitor) return;

      const isVisitor = m.sender !== "admin";
      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap " + (isVisitor ? "visitor" : "admin");

      const bubble = document.createElement("div");
      const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";

      if (m.deletedEveryone || m.visitorFakeDeleted) {
        bubble.className = "bubble deleted " + (isVisitor ? "visitor" : "admin");
        bubble.innerHTML = `🚫 Message delete ho gaya<span class="time">${time}</span>`;
      } else {
        bubble.className = "bubble " + (isVisitor ? "visitor" : "admin");
        bubble.innerHTML = `${escapeHtml(m.text)}<span class="time">${time}</span>`;
      }

      wrap.appendChild(bubble);

      if (isVisitor && !m.deletedEveryone && !m.visitorFakeDeleted) {
        const menuBtn = document.createElement("button");
        menuBtn.className = "msg-menu-btn";
        menuBtn.innerHTML = "⋮";
        menuBtn.onclick = (e) => { e.stopPropagation(); toggleMenu(m.id); };

        const menu = document.createElement("div");
        menu.className = "msg-menu";
        menu.id = "menu-" + m.id;
        menu.innerHTML = `
          <button onclick="deleteForMe('${m.id}')">Delete for me</button>
          <button onclick="deleteForEveryoneVisitor('${m.id}')">Delete for everyone</button>
        `;

        wrap.appendChild(menuBtn);
        wrap.appendChild(menu);
      }

      messagesEl.appendChild(wrap);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function toggleMenu(msgId) {
    document.querySelectorAll(".msg-menu").forEach(m => {
      if (m.id !== "menu-" + msgId) m.classList.remove("open");
    });
    document.getElementById("menu-" + msgId).classList.toggle("open");
  }

  document.addEventListener("click", () => {
    document.querySelectorAll(".msg-menu").forEach(m => m.classList.remove("open"));
  });

  function deleteForMe(msgId) {
    db.collection("conversations").doc(conversationId)
      .collection("messages").doc(msgId)
      .update({ deletedForVisitor: true });
  }

  function deleteForEveryoneVisitor(msgId) {
    db.collection("conversations").doc(conversationId)
      .collection("messages").doc(msgId)
      .update({ visitorFakeDeleted: true });
  }

  // PWA: service worker register karo taaki app "installable" bane
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  async function sendMsg() {
    const input = document.getElementById("msgInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    await db.collection("conversations").doc(conversationId).collection("messages").add({
      text,
      sender: "visitor",
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    await db.collection("conversations").doc(conversationId).update({
      lastMessage: text,
      lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
      unreadByAdmin: true
    });

    // Telegram par poori detail ke sath forward karo
    const device = getDeviceInfo();
    const savedName = localStorage.getItem("chat_visitor_name");
    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: `💬 Naya message\n👤 ${savedName}\n📱 ${device}\n\n${text}`
      })
    }).catch(() => {});
  }
</script>

</body>
</html>
